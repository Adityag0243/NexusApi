services:
  - type: web
    name: nexus-api-web
    env: python
    region: oregon 
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexus-redis
          property: connectionString

  - type: worker
    name: nexus-api-worker
    env: python
    region: oregon 
    buildCommand: "pip install -r requirements.txt"
    startCommand: "arq src.worker.WorkerSettings"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexus-redis
          property: connectionString

  - type: redis
    name: nexus-redis
    ipAllowList: [] # Keep internal
    plan: free
